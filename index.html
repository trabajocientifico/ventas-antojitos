<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1C1A17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Antojitos">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='38' fill='%231C1A17'/><text x='50%25' y='58%25' font-size='110' text-anchor='middle' dominant-baseline='middle'>🫓</text></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>🫓</text></svg>">
<title>Pedidos — Antojitos y algo más</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --maiz:#F2B705; --maiz-osc:#D99A00;
    --carbon:#1C1A17; --crema:#FBF7EE;
    --verde:#1F8A4C; --azul:#2563EB;
    --gris:#8B857A; --linea:#E7E0D2; --rojo:#C2410C;

    /* Color sutil por categoría (solo acentos: borde y punto) */
    --cat-arepas:    #F2B705;  /* maíz */
    --cat-patacona:  #16A34A;  /* verde plátano */
    --cat-perros:    #E11D48;  /* rojo salsa */
    --cat-picar:     #D97706;  /* ámbar fritura */
    --cat-salchipapa:#2563EB;  /* azul */
    --cat-adiciones: #7C3AED;  /* púrpura topping */
    --cat-bebidas:   #0EA5E9;  /* azul cielo */
    --cat-otros:     #6B7280;  /* gris pizarra */
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;touch-action:manipulation}
  body{
    font-family:Archivo,system-ui,sans-serif;
    background:var(--crema);color:var(--carbon);line-height:1.3;
    -webkit-text-size-adjust:100%;user-select:none;-webkit-user-select:none;
  }
  button{touch-action:manipulation;font-family:inherit}
  input{font-family:inherit;-webkit-user-select:text;user-select:text}

  /* ===== Cabecera (sticky) ===== */
  .cabecera{position:sticky;top:0;z-index:30}
  .tope{
    background:var(--carbon);color:var(--crema);
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    position:relative;overflow:hidden;isolation:isolate;
  }

  /* Destello sutil que cruza la barra cada pocos segundos */
  .tope::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:linear-gradient(115deg,
      transparent 0%, transparent 42%,
      rgba(255,255,255,.05) 47%, rgba(255,255,255,.11) 50%, rgba(255,255,255,.05) 53%,
      transparent 58%, transparent 100%);
    background-size:280% 100%;
    background-position:-120% 0;
    animation:topeShine 7s ease-in-out infinite;
  }
  /* Línea neón animada en el borde inferior */
  .tope::after{
    content:'';position:absolute;left:0;right:0;bottom:0;height:2px;pointer-events:none;z-index:1;
    background:linear-gradient(90deg,
      #FF4DD8 0%, #00E5FF 25%, #F2B705 50%, #62F764 75%, #FF4DD8 100%);
    background-size:200% 100%;
    animation:neonShift 4.5s linear infinite;
    filter:drop-shadow(0 0 4px rgba(255,77,216,.55)) drop-shadow(0 0 6px rgba(0,229,255,.35));
  }
  .tope > *{position:relative;z-index:2}

  @keyframes topeShine{
    0%, 35%  { background-position:-120% 0; }
    65%      { background-position:220% 0; }
    100%     { background-position:220% 0; }
  }
  @keyframes neonShift{
    to { background-position:-200% 0; }
  }

  .marca{font-weight:800;font-size:17px;letter-spacing:-.3px;display:flex;align-items:center;gap:7px;line-height:1.1}
  .marca .sep{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
    background:var(--maiz);
    box-shadow:0 0 5px rgba(242,183,5,.85), 0 0 12px rgba(242,183,5,.45);
    animation:sepGlow 3.2s ease-in-out infinite;
  }
  @keyframes sepGlow{
    0%, 100% { background:#F2B705; box-shadow:0 0 5px rgba(242,183,5,.9),  0 0 12px rgba(242,183,5,.5); }
    33%      { background:#00E5FF; box-shadow:0 0 6px rgba(0,229,255,.9),  0 0 14px rgba(0,229,255,.5); }
    66%      { background:#FF4DD8; box-shadow:0 0 6px rgba(255,77,216,.9), 0 0 14px rgba(255,77,216,.5); }
  }

  @media (prefers-reduced-motion: reduce){
    .tope::before, .tope::after, .marca .sep { animation:none }
  }
  .hoy{text-align:right;line-height:1.1}
  .hoy small{display:block;font-size:10px;color:#b9b2a4;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
  .hoy b{font-size:18px;font-variant-numeric:tabular-nums}
  .hoy em{display:block;font-style:normal;font-size:10px;color:#b9b2a4;margin-top:2px}

  .vendedores{display:flex;gap:8px;padding:10px 16px;background:var(--crema);border-bottom:1px solid var(--linea)}
  .vendedores button{
    flex:1;padding:11px;border:2px solid var(--linea);background:#fff;border-radius:10px;
    font-weight:700;font-size:15px;color:var(--carbon);cursor:pointer;min-height:44px
  }
  .vendedores button.activo{border-color:var(--carbon);background:var(--carbon);color:var(--crema)}

  /* ===== Vista LISTA ===== */
  .seccion-titulo{
    padding:18px 16px 8px;font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--gris);font-weight:700;display:flex;justify-content:space-between;align-items:center
  }
  .seccion-titulo button{
    background:none;border:none;color:var(--gris);font-weight:700;font-size:11px;
    text-transform:uppercase;letter-spacing:1px;cursor:pointer;padding:4px 6px
  }
  .lista-cuentas{padding:0 16px 110px;display:flex;flex-direction:column;gap:10px}
  .cuenta{
    background:#fff;border:1px solid var(--linea);border-radius:14px;padding:14px;
    display:flex;flex-direction:column;gap:6px;cursor:pointer;text-align:left;width:100%;
    transition:transform .06s ease;
  }
  .cuenta:active{transform:scale(.985)}
  .cuenta .fila1{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .cuenta .num{font-weight:800;font-size:17px}
  .cuenta .num .cli{font-weight:700;color:#3a3631;font-size:15px;margin-left:6px}
  .cuenta .tot{font-weight:800;font-size:18px;color:var(--carbon);font-variant-numeric:tabular-nums;white-space:nowrap}
  .cuenta .fila2{font-size:12px;color:var(--gris);font-weight:600}
  .vacio{padding:50px 24px;text-align:center;color:var(--gris);font-size:14px}
  .vacio .ic{display:block;font-size:42px;margin-bottom:10px;opacity:.4}

  .fab{
    position:fixed;left:16px;right:16px;
    bottom:calc(14px + env(safe-area-inset-bottom));z-index:35;
    background:var(--maiz);color:var(--carbon);border:none;border-radius:14px;
    padding:18px;font-weight:800;font-size:17px;cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,.18);min-height:58px;
  }
  .fab:active{background:var(--maiz-osc)}

  /* ===== Vista PEDIDO ===== */
  .pedido-tope{
    display:flex;align-items:center;gap:8px;padding:10px 12px;
    background:#fff;border-bottom:1px solid var(--linea)
  }
  .pedido-tope .atras{
    background:none;border:none;font-size:24px;width:44px;height:44px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--carbon);font-weight:800
  }
  .pedido-tope .titulo{flex:1;font-weight:800;font-size:17px;line-height:1.15}
  .pedido-tope .titulo small{display:block;color:var(--gris);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
  .pedido-tope .anular{
    background:none;border:1px solid var(--linea);color:var(--rojo);font-weight:700;font-size:12px;
    padding:8px 12px;border-radius:8px;cursor:pointer
  }
  .cliente-input{
    width:calc(100% - 32px);margin:12px 16px 0;padding:14px;border-radius:12px;
    border:2px solid var(--linea);background:#fff;font-size:16px;font-weight:600;
    color:var(--carbon);outline:none
  }
  .cliente-input:focus{border-color:var(--maiz)}
  .cliente-input::placeholder{color:#bcb5a6;font-weight:500}

  .grilla{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px 320px}
  .cat-titulo{
    grid-column:1 / -1;padding:10px 2px 2px 14px;font-size:11px;text-transform:uppercase;
    letter-spacing:1.2px;color:var(--gris);font-weight:800;
    display:flex;align-items:center;gap:8px;position:relative
  }
  .cat-titulo:first-child{padding-top:0}
  .cat-titulo::before{
    content:'';width:8px;height:8px;border-radius:50%;
    background:var(--cat-color,var(--gris));flex-shrink:0;
    box-shadow:0 0 0 2px rgba(255,255,255,.6)
  }
  .prod{
    background:#fff;border:1px solid var(--linea);border-radius:14px;padding:14px 12px;
    text-align:left;cursor:pointer;position:relative;transition:transform .06s ease;
    min-height:92px;display:flex;flex-direction:column;justify-content:space-between;
    box-shadow:inset 4px 0 0 var(--cat-color,var(--linea))
  }
  .prod:active{transform:scale(.97)}
  .prod-info{display:flex;flex-direction:column;gap:3px;padding-left:4px}
  .prod .nom{font-weight:700;font-size:15px;line-height:1.15}
  .prod .desc{font-size:11px;color:var(--gris);font-weight:600;line-height:1.2}
  .prod .pre{font-weight:800;color:var(--maiz-osc);font-size:16px;font-variant-numeric:tabular-nums;margin-top:8px;padding-left:4px}
  .prod .badge{
    position:absolute;top:-8px;right:-8px;background:var(--rojo);color:#fff;
    min-width:26px;height:26px;border-radius:13px;display:none;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;padding:0 6px;box-shadow:0 2px 6px rgba(0,0,0,.25)
  }
  .prod.tiene .badge{display:flex}
  .prod.tiene{
    border-color:var(--maiz);
    box-shadow:inset 4px 0 0 var(--cat-color,var(--maiz)), inset 0 0 0 2px var(--maiz)
  }

  .carrito{
    position:fixed;left:0;right:0;bottom:0;background:#fff;z-index:40;
    border-top:1px solid var(--linea);box-shadow:0 -8px 24px rgba(0,0,0,.10);
    border-radius:18px 18px 0 0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;max-height:62vh;
  }
  .lista{flex:1;overflow-y:auto;margin-bottom:8px;min-height:0;max-height:160px}
  .lista:empty::after{content:'Toca un producto para empezar';color:var(--gris);font-size:14px;display:block;padding:8px 0;text-align:center}
  .item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--linea)}
  .item .inom{flex:1;font-weight:700;font-size:14px}
  .item .ctrl{display:flex;align-items:center;gap:6px}
  .item .ctrl button{width:38px;height:38px;border-radius:10px;border:1px solid var(--linea);background:var(--crema);font-size:20px;font-weight:800;cursor:pointer}
  .item .icant{min-width:22px;text-align:center;font-weight:800;font-variant-numeric:tabular-nums}
  .item .isub{min-width:68px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;font-size:14px}

  .fila-total{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .total-num{flex:1;font-weight:800;font-size:24px;font-variant-numeric:tabular-nums}
  .total-num small{display:block;font-size:10px;color:var(--gris);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:1px}

  .acciones{display:flex;gap:8px}
  .acciones button{
    flex:1;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;
    padding:14px 4px;min-height:54px;color:#fff;line-height:1.1
  }
  .acciones .guardar{background:var(--carbon);color:var(--crema)}
  .acciones .efectivo{background:var(--verde)}
  .acciones .transferencia{background:var(--azul)}
  .acciones button:disabled{background:var(--linea);color:var(--gris);cursor:not-allowed}
  .acciones button:active:not(:disabled){opacity:.85}

  .toast{
    position:fixed;left:50%;bottom:30%;transform:translateX(-50%) translateY(20px);
    background:var(--carbon);color:#fff;padding:12px 18px;border-radius:12px;font-weight:700;
    font-size:14px;opacity:0;transition:all .25s ease;z-index:60;pointer-events:none;max-width:90%;text-align:center
  }
  .toast.ver{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.error{background:var(--rojo)}

  .oculto{display:none !important}
</style>
</head>
<body>

  <!-- Cabecera común (visible en las dos vistas) -->
  <div class="cabecera">
    <header class="tope">
      <div class="marca">
        <span aria-hidden="true">🫓</span>
        <span>Antojitos</span>
        <span class="sep" aria-hidden="true"></span>
        <span>y algo más</span>
      </div>
      <div class="hoy">
        <small>Vendido hoy</small>
        <b id="totalHoy">—</b>
        <em id="ventasHoy">—</em>
      </div>
    </header>
    <div class="vendedores" id="vendedores"></div>
  </div>

  <!-- VISTA: lista de cuentas abiertas -->
  <main id="vistaLista">
    <div class="seccion-titulo">
      <span>Cuentas abiertas</span>
      <button id="btnActualizar">↻ Actualizar</button>
    </div>
    <div class="lista-cuentas" id="listaCuentas"></div>
    <button class="fab" id="btnNuevo">+ Nuevo pedido</button>
  </main>

  <!-- VISTA: detalle de un pedido (nuevo o existente) -->
  <main id="vistaPedido" class="oculto">
    <div class="pedido-tope">
      <button class="atras" id="btnAtras" aria-label="Volver">←</button>
      <div class="titulo" id="tituloPedido">Nuevo pedido<small id="subtituloPedido">Sin guardar</small></div>
      <button class="anular oculto" id="btnAnular">Anular</button>
    </div>
    <input class="cliente-input" id="inputCliente" type="text"
           placeholder="Cliente o mesa (ej.: Mesa 2, Juan, Para llevar…)"
           maxlength="40" autocomplete="off">
    <div class="grilla" id="grilla"></div>
    <div class="carrito">
      <div class="lista" id="lista"></div>
      <div class="fila-total">
        <div class="total-num"><small>Total</small><span id="totalVenta">$0</span></div>
      </div>
      <div class="acciones">
        <button class="guardar" id="btnGuardar" disabled>💾 Guardar</button>
        <button class="efectivo" id="btnEfectivo" disabled>💵 Efectivo</button>
        <button class="transferencia" id="btnTransfer" disabled>📲 Transfer.</button>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

<script>
/* =======================================================================
   CONFIGURACIÓN
   ======================================================================= */
const URL_APP = "https://script.google.com/macros/s/AKfycbxw3L3Xck5VNCPsfVL53aEHRxnnKGmi5Xa7y9z9zmu16RF3OkjKwlL7R5B7MnmOdjlG1w/exec";

const VENDEDORES = ["Valentina", "Alex"];

const PRODUCTOS = [
  // AREPAS
  { categoria: "Arepas", nombre: "Arepa con queso",                                                       precio: 4000  },
  { categoria: "Arepas", nombre: "Arepa hawaiana",       descripcion: "queso, piña y jamón",              precio: 6000  },
  { categoria: "Arepas", nombre: "Arepa de huevo",       descripcion: "huevo revuelto y queso",           precio: 7000  },
  { categoria: "Arepas", nombre: "Arepa con chorizo",    descripcion: "chorizo y queso",                  precio: 9000  },
  { categoria: "Arepas", nombre: "Arepa con carne",      descripcion: "carne y queso",                    precio: 8000  },
  { categoria: "Arepas", nombre: "Arepa con pollo",      descripcion: "pollo y queso",                    precio: 8000  },
  { categoria: "Arepas", nombre: "Arepa mixta",          descripcion: "pollo, carne y queso",             precio: 10000 },
  { categoria: "Arepas", nombre: "Arepa con todo",       descripcion: "pollo, carne, chorizo, maíz, queso y piña", precio: 13000 },
  { categoria: "Arepas", nombre: "Arepa con mollejas",   descripcion: "mollejas y queso",                 precio: 8000  },
  { categoria: "Arepas", nombre: "Arepa con champiñones",                                                 precio: 10000 },

  // PATACONA
  { categoria: "Patacona", nombre: "Patacón pisao", descripcion: "carne, pollo, aguacate, maíz y queso", precio: 15000 },

  // PERROS
  { categoria: "Perros", nombre: "Perro sencillo", precio: 11000 },
  { categoria: "Perros", nombre: "Chiriperro",     precio: 15000 },

  // PARA PICAR
  { categoria: "Para picar", nombre: "Chorizo",             precio: 5000 },
  { categoria: "Para picar", nombre: "Empanada",            precio: 2500 },
  { categoria: "Para picar", nombre: "Papa rellena",        precio: 3000 },
  { categoria: "Para picar", nombre: "Pincho de carne",     precio: 6000 },
  { categoria: "Para picar", nombre: "Pincho de pollo",     precio: 5000 },
  { categoria: "Para picar", nombre: "Pincho de mollejas",  precio: 5000 },

  // SALCHIPAPA
  { categoria: "Salchipapa", nombre: "Salchipapa sencilla", descripcion: "papas, salchicha y queso",                   precio: 8000  },
  { categoria: "Salchipapa", nombre: "Salchicha bomba",     descripcion: "papas, carne, chorizo, salchicha y queso",   precio: 15000 },

  // TOPIS (adiciones)
  { categoria: "Adiciones", nombre: "Chicharrón",   precio: 3000 },
  { categoria: "Adiciones", nombre: "Piña",         precio: 1000 },
  { categoria: "Adiciones", nombre: "Champiñones",  precio: 3000 },

  // BEBIDAS
  { categoria: "Bebidas", nombre: "Gaseosa $3.000", precio: 3000 },
  { categoria: "Bebidas", nombre: "Gaseosa $3.500", precio: 3500 },
  { categoria: "Bebidas", nombre: "Gaseosa $5.000", precio: 5000 },
  { categoria: "Bebidas", nombre: "Gaseosa $7.000", precio: 7000 },
  { categoria: "Bebidas", nombre: "Jugo $1.000",    precio: 1000 },
  { categoria: "Bebidas", nombre: "Jugo $4.000",    precio: 4000 },

  // OTROS
  { categoria: "Otros", nombre: "Picada chunchulla", descripcion: "desde $12.000 — ajusta manualmente si es mayor", precio: 12000 },
];

/* =======================================================================
   Estado y utilidades
   ======================================================================= */
const $ = (id) => document.getElementById(id);
const pesos = (n) => "$" + Number(n || 0).toLocaleString("es-CO");
const vibrar = (ms) => { if (navigator.vibrate) navigator.vibrate(ms); };

let vendedor = localStorage.getItem("vendedor") || VENDEDORES[0];
if (!VENDEDORES.includes(vendedor)) vendedor = VENDEDORES[0];

let vista = "lista";              // "lista" | "pedido"
let cuentasAbiertas = [];         // viene del backend
let pedidoActual = null;          // { idPedido?, numPedido?, cliente, carrito, esNuevo }
let pollHandle = null;
let guardando = false;

function precioDe(nombre){
  const p = PRODUCTOS.find(x => x.nombre === nombre);
  return p ? p.precio : 0;
}

/**
 * Devuelve el precio aplicable a un item del pedido actual.
 * Si el item viene de un pedido ya abierto, conserva su precio original
 * (aunque PRODUCTOS haya cambiado o el nombre ya no exista en el catálogo).
 * Si es un item nuevo, usa el precio actual del catálogo.
 */
function precioItem(nombre){
  if (pedidoActual && pedidoActual.precios && pedidoActual.precios[nombre] != null) {
    return pedidoActual.precios[nombre];
  }
  return precioDe(nombre);
}

function tiempoTranscurrido(ms){
  const diff = Date.now() - ms;
  const min = Math.floor(diff / 60000);
  if (min < 1)   return "recién";
  if (min < 60)  return `hace ${min} min`;
  const h = Math.floor(min/60), m = min%60;
  return m ? `hace ${h}h ${m}m` : `hace ${h}h`;
}

/* =======================================================================
   Vendedores
   ======================================================================= */
const elVend = $("vendedores");
function pintarVendedores(){
  elVend.innerHTML = "";
  VENDEDORES.forEach(v => {
    const b = document.createElement("button");
    b.textContent = v;
    if (v === vendedor) b.classList.add("activo");
    b.onclick = () => {
      vendedor = v;
      localStorage.setItem("vendedor", v);
      pintarVendedores();
      vibrar(6);
    };
    elVend.appendChild(b);
  });
}
pintarVendedores();

/* =======================================================================
   Vista LISTA
   ======================================================================= */
function pintarLista(){
  const cont = $("listaCuentas");
  cont.innerHTML = "";
  if (cuentasAbiertas.length === 0) {
    cont.innerHTML = `<div class="vacio"><span class="ic">🧾</span>
      No hay cuentas abiertas.<br>Toca <b>+ Nuevo pedido</b> para empezar.</div>`;
    return;
  }
  cuentasAbiertas.forEach(p => {
    const cant = p.items.reduce((s,it)=>s+it.cantidad, 0);
    const cli = p.cliente ? p.cliente : "Sin nombre";
    const card = document.createElement("button");
    card.className = "cuenta";
    card.innerHTML = `
      <div class="fila1">
        <div class="num">#${p.pedido}<span class="cli"> · ${cli}</span></div>
        <div class="tot">${pesos(p.total)}</div>
      </div>
      <div class="fila2">${p.vendedor} · ${tiempoTranscurrido(p.abierta)} · ${cant} ${cant===1?'producto':'productos'}</div>
    `;
    card.onclick = () => abrirPedidoExistente(p);
    cont.appendChild(card);
  });
}

async function cargarEstado(){
  try {
    const r = await fetch(URL_APP, { method: "GET" });
    const d = await r.json();
    if (!d.ok) return;
    cuentasAbiertas = d.abiertos || [];
    $("totalHoy").textContent = pesos(d.totalHoy);
    const n = d.ventas || 0;
    $("ventasHoy").textContent = n + (n === 1 ? " pedido" : " pedidos");
    if (vista === "lista") pintarLista();
  } catch (e) { /* silencioso, reintenta en el próximo poll */ }
}

function iniciarPoll(){
  pararPoll();
  pollHandle = setInterval(() => {
    if (document.visibilityState === "visible" && vista === "lista" && !guardando) {
      cargarEstado();
    }
  }, 5000);
}
function pararPoll(){
  if (pollHandle) clearInterval(pollHandle);
  pollHandle = null;
}

$("btnActualizar").onclick = () => { vibrar(6); cargarEstado(); };

/* =======================================================================
   Navegación entre vistas
   ======================================================================= */
function irALista(){
  vista = "lista";
  $("vistaPedido").classList.add("oculto");
  $("vistaLista").classList.remove("oculto");
  pedidoActual = null;
  window.scrollTo(0, 0);
  cargarEstado();
}

function irAPedido(){
  vista = "pedido";
  $("vistaLista").classList.add("oculto");
  $("vistaPedido").classList.remove("oculto");
  window.scrollTo(0, 0);
  pintarPedido();
}

$("btnAtras").onclick = () => {
  if (tieneCambiosSinGuardar() && !confirm("Tienes cambios sin guardar. ¿Salir de todos modos?")) return;
  irALista();
};

function tieneCambiosSinGuardar(){
  if (!pedidoActual) return false;
  if (pedidoActual.esNuevo) {
    return Object.keys(pedidoActual.carrito).length > 0;
  }
  // Comparar carrito actual vs el original (snapshot guardado al abrir)
  const orig = pedidoActual.original || {};
  const act = pedidoActual.carrito;
  const claves = new Set([...Object.keys(orig), ...Object.keys(act)]);
  for (const k of claves) if ((orig[k]||0) !== (act[k]||0)) return true;
  if ((pedidoActual.original_cliente || "") !== (pedidoActual.cliente || "")) return true;
  return false;
}

/* =======================================================================
   Nuevo pedido / abrir pedido existente
   ======================================================================= */
$("btnNuevo").onclick = () => {
  pedidoActual = { cliente: "", carrito: {}, precios: {}, esNuevo: true };
  vibrar(8);
  irAPedido();
};

function abrirPedidoExistente(p){
  const carrito = {};
  const precios = {};
  p.items.forEach(it => {
    carrito[it.producto] = (carrito[it.producto] || 0) + it.cantidad;
    // Conserva el precio con el que se vendió originalmente, aunque el catálogo cambie.
    if (precios[it.producto] == null && Number(it.precio) > 0) {
      precios[it.producto] = Number(it.precio);
    }
  });
  pedidoActual = {
    idPedido: p.idPedido,
    numPedido: p.pedido,
    cliente: p.cliente || "",
    carrito: carrito,
    precios: precios,
    esNuevo: false,
    original: Object.assign({}, carrito),
    original_cliente: p.cliente || "",
    vendedorOrig: p.vendedor || ""
  };
  vibrar(8);
  irAPedido();
}

/* =======================================================================
   Vista PEDIDO — render
   ======================================================================= */
const COLOR_CATEGORIA = {
  "Arepas":     "var(--cat-arepas)",
  "Patacona":   "var(--cat-patacona)",
  "Perros":     "var(--cat-perros)",
  "Para picar": "var(--cat-picar)",
  "Salchipapa": "var(--cat-salchipapa)",
  "Adiciones":  "var(--cat-adiciones)",
  "Bebidas":    "var(--cat-bebidas)",
  "Otros":      "var(--cat-otros)",
};

const elGrilla = $("grilla");
let ultimaCategoria = null;
PRODUCTOS.forEach(p => {
  const color = COLOR_CATEGORIA[p.categoria] || "var(--gris)";
  if (p.categoria && p.categoria !== ultimaCategoria) {
    const h = document.createElement("div");
    h.className = "cat-titulo";
    h.style.setProperty("--cat-color", color);
    h.textContent = p.categoria;
    elGrilla.appendChild(h);
    ultimaCategoria = p.categoria;
  }
  const b = document.createElement("button");
  b.className = "prod";
  b.dataset.nombre = p.nombre;
  b.style.setProperty("--cat-color", color);
  const desc = p.descripcion ? `<span class="desc">${p.descripcion}</span>` : "";
  b.innerHTML = `<span class="badge">0</span>
                 <span class="prod-info">
                   <span class="nom">${p.nombre}</span>
                   ${desc}
                 </span>
                 <span class="pre">${pesos(p.precio)}</span>`;
  b.onclick = () => agregar(p.nombre);
  elGrilla.appendChild(b);
});

$("inputCliente").addEventListener("input", (e) => {
  if (pedidoActual) pedidoActual.cliente = e.target.value;
});

function agregar(nombre){
  pedidoActual.carrito[nombre] = (pedidoActual.carrito[nombre] || 0) + 1;
  vibrar(8);
  pintarCarrito();
}
function cambiar(nombre, delta){
  pedidoActual.carrito[nombre] = (pedidoActual.carrito[nombre] || 0) + delta;
  if (pedidoActual.carrito[nombre] <= 0) delete pedidoActual.carrito[nombre];
  vibrar(6);
  pintarCarrito();
}

function pintarPedido(){
  // Título
  if (pedidoActual.esNuevo) {
    $("tituloPedido").firstChild.textContent = "Nuevo pedido";
    $("subtituloPedido").textContent = "Sin guardar";
    $("btnAnular").classList.add("oculto");
  } else {
    $("tituloPedido").firstChild.textContent = `Pedido #${pedidoActual.numPedido}`;
    $("subtituloPedido").textContent = "Cuenta abierta";
    $("btnAnular").classList.remove("oculto");
  }
  $("inputCliente").value = pedidoActual.cliente || "";
  pintarCarrito();
}

function pintarCarrito(){
  // badges en productos
  document.querySelectorAll(".prod").forEach(el => {
    const c = pedidoActual.carrito[el.dataset.nombre] || 0;
    el.classList.toggle("tiene", c > 0);
    el.querySelector(".badge").textContent = c;
  });
  // lista del carrito
  const lista = $("lista"); lista.innerHTML = "";
  let total = 0;
  Object.keys(pedidoActual.carrito).forEach(nombre => {
    const cant = pedidoActual.carrito[nombre];
    const sub = cant * precioItem(nombre);
    total += sub;
    const row = document.createElement("div");
    row.className = "item";
    row.innerHTML = `
      <span class="inom">${nombre}</span>
      <span class="ctrl">
        <button aria-label="menos">−</button>
        <span class="icant">${cant}</span>
        <button aria-label="más">+</button>
      </span>
      <span class="isub">${pesos(sub)}</span>`;
    row.querySelectorAll("button")[0].onclick = () => cambiar(nombre, -1);
    row.querySelectorAll("button")[1].onclick = () => cambiar(nombre, +1);
    lista.appendChild(row);
  });
  $("totalVenta").textContent = pesos(total);
  const hayItems = total > 0;
  $("btnGuardar").disabled = !hayItems || guardando;
  $("btnEfectivo").disabled = !hayItems || guardando;
  $("btnTransfer").disabled = !hayItems || guardando;
}

/* =======================================================================
   Guardar / cobrar / anular
   ======================================================================= */
async function enviar(accion, extra){
  if (guardando) return;
  guardando = true;
  setEstadoBotones(true);

  const items = Object.keys(pedidoActual.carrito).map(nombre => ({
    producto: nombre,
    cantidad: pedidoActual.carrito[nombre],
    precio: precioItem(nombre)
  }));
  if (items.length === 0 && accion !== "anular") {
    guardando = false; setEstadoBotones(false);
    return aviso("Agrega al menos un producto", true);
  }

  // Si el pedido ya existía, mantén el vendedor original; si es nuevo, usa el activo.
  const vendedorAEnviar = (!pedidoActual.esNuevo && pedidoActual.vendedorOrig)
    ? pedidoActual.vendedorOrig
    : vendedor;

  const body = Object.assign({
    action: accion,
    vendedor: vendedorAEnviar,
    cliente: pedidoActual.cliente || "",
    items: items,
  }, extra || {});
  if (pedidoActual.idPedido) body.idPedido = pedidoActual.idPedido;

  try {
    const r = await fetch(URL_APP, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || "Error");

    if (accion === "guardar") {
      vibrar([12,30,12]);
      aviso(`💾 Pedido #${d.pedido} guardado`);
    } else if (accion === "cobrar") {
      vibrar([15,40,15]);
      aviso(`✅ Pedido #${d.pedido} cobrado · ${pesos(d.total)}`);
    } else if (accion === "anular") {
      vibrar([20,40,20]);
      aviso(`Pedido anulado`);
    }
    irALista();
  } catch (e) {
    vibrar([60,50,60]);
    aviso("⚠️ " + (e && e.message ? e.message : "No se pudo guardar. Revisa internet."), true);
  } finally {
    guardando = false;
    setEstadoBotones(false);
  }
}

function setEstadoBotones(cargando){
  ["btnGuardar","btnEfectivo","btnTransfer"].forEach(id => {
    const el = $(id);
    el.disabled = cargando || Object.keys(pedidoActual?.carrito || {}).length === 0;
  });
  if (cargando) {
    $("btnGuardar").textContent  = "Guardando…";
    $("btnEfectivo").textContent = "…";
    $("btnTransfer").textContent = "…";
  } else {
    $("btnGuardar").textContent  = "💾 Guardar";
    $("btnEfectivo").textContent = "💵 Efectivo";
    $("btnTransfer").textContent = "📲 Transfer.";
  }
}

$("btnGuardar").onclick  = () => enviar("guardar");
$("btnEfectivo").onclick = () => enviar("cobrar", { pago: "Efectivo" });
$("btnTransfer").onclick = () => enviar("cobrar", { pago: "Transferencia" });

$("btnAnular").onclick = async () => {
  if (!pedidoActual?.idPedido) return;
  if (!confirm(`¿Anular el pedido #${pedidoActual.numPedido}?\nNo se puede deshacer.`)) return;
  try {
    const r = await fetch(URL_APP, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "anular", idPedido: pedidoActual.idPedido })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    aviso(`Pedido #${pedidoActual.numPedido} anulado`);
    irALista();
  } catch (e) {
    aviso("⚠️ " + (e && e.message ? e.message : "No se pudo anular"), true);
  }
};

/* =======================================================================
   Aviso (toast)
   ======================================================================= */
let tToast;
function aviso(msg, esError){
  const t = $("toast");
  t.textContent = msg;
  t.classList.toggle("error", !!esError);
  t.classList.add("ver");
  clearTimeout(tToast);
  tToast = setTimeout(() => t.classList.remove("ver"), 2800);
}

/* =======================================================================
   Arranque
   ======================================================================= */
if (URL_APP.startsWith("http")) {
  cargarEstado();
  iniciarPoll();
} else {
  aviso("Falta pegar la URL de Apps Script en el código.", true);
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && vista === "lista") cargarEstado();
});
</script>
